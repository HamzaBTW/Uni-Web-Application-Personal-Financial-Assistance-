<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisr Wireframe</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="promo">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="brand">
      <div class="brand-icon"></div>
      <div class="brand-name"></div>
    </div>
    <div class="l" style="width:100%"></div>
    <div class="l" style="width:88%"></div>
    <div class="l" style="width:65%"></div>
    <div class="tech">
      <div class="t-icon"></div>
      <div class="t-icon"></div>
      <div class="t-icon"></div>
      <div class="t-icon"></div>
    </div>
    <div class="stats">
      <div><div class="s-num"></div><div class="s-lbl"></div></div>
      <div><div class="s-num"></div><div class="s-lbl"></div></div>
      <div><div class="s-num"></div><div class="s-lbl"></div></div>
    </div>
  </div>

  <!-- RIGHT: 6 mini screens -->
  <div class="screens-grid">

    <!-- light -->
    <div class="screen">
      <div class="tl" style="width:95%"></div>
      <div class="tl" style="width:82%"></div>
      <div class="tl sm"></div>
      <div style="display:flex;gap:5px"><div class="bt"></div><div class="bt2"></div></div>
      <div class="si"></div>
    </div>

    <!-- dark -->
    <div class="screen dark">
      <div class="tl" style="width:90%"></div>
      <div class="tl" style="width:85%"></div>
      <div class="tl sm"></div>
      <div class="bt"></div>
      <div class="si"></div>
    </div>

    <!-- green accent -->
    <div class="screen">
      <div class="tl" style="width:95%"></div>
      <div class="tl" style="width:80%"></div>
      <div class="tl sm"></div>
      <div class="bt" style="background:#7ab898"></div>
      <div class="si"></div>
    </div>

    <!-- navy -->
    <div class="screen navy">
      <div class="tl" style="width:92%"></div>
      <div class="tl" style="width:85%"></div>
      <div class="tl sm"></div>
      <div style="display:flex;gap:5px"><div class="bt"></div><div class="bt" style="background:transparent;border:1px solid #2a4070"></div></div>
      <div class="si"></div>
    </div>

    <!-- red accent -->
    <div class="screen">
      <div class="tl" style="width:95%"></div>
      <div class="tl" style="width:80%"></div>
      <div class="tl sm"></div>
      <div style="display:flex;gap:5px"><div class="bt" style="background:#c05858"></div><div class="bt2"></div></div>
      <div class="si"></div>
    </div>

    <!-- orange accent -->
    <div class="screen">
      <div class="tl" style="width:90%"></div>
      <div class="tl" style="width:85%"></div>
      <div class="tl sm"></div>
      <div style="display:flex;gap:5px"><div class="bt" style="background:#b87030"></div><div class="bt2"></div></div>
      <div class="si"></div>
    </div>

  </div>

</div>
</body>
</html>
