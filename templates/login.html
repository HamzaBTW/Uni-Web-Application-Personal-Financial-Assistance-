<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisr — Login / Sign Up</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #b0b8d0;
    min-height: 100vh;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ─── NAV ─── */
  .nav {
    height: 52px;
    background: #c4c8d4;
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 14px;
    flex-shrink: 0;
  }
  .nav-logo { width: 36px; height: 36px; border-radius: 50%; background: #8e97b0; }
  .nav-name { width: 80px; height: 16px; background: #9aa2b8; border-radius: 4px; }
  .nav-spacer { flex: 1; }
  .nav-link { width: 48px; height: 10px; background: #b0b8cc; border-radius: 3px; }
  .nav-btn  { width: 72px; height: 28px; background: #9aa2b8; border-radius: 5px; }

  /* ─── MAIN LAYOUT ─── */
  .page-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 60px;
  }

  /* ─── LEFT PROMO PANEL ─── */
  .promo-side {
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 320px;
  }
  .promo-heading {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ph { height: 20px; background: #8e97b0; border-radius: 4px; }
  .promo-sub {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: 4px;
  }
  .ps { height: 10px; background: #a0a8bf; border-radius: 3px; }

  .promo-features {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 8px;
  }
  .feat-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .feat-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: #8e97b0; flex-shrink: 0;
  }
  .feat-lines {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }
  .fl { height: 9px; background: #a0a8bf; border-radius: 3px; }

  /* ─── AUTH CARD ─── */
  .auth-card {
    width: 380px;
    background: #d8dce8;
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,.18);
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* tab toggle */
  .tab-bar {
    display: flex;
    border-radius: 8px;
    overflow: hidden;
    background: #c4c8d4;
  }
  .tab {
    flex: 1;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .2s;
  }
  .tab .tab-label { height: 11px; border-radius: 3px; width: 56px; background: #b0b8cc; }
  .tab.active { background: #9aa2b8; }
  .tab.active .tab-label { background: #d8dce8; }

  /* form field */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field-label { width: 70px; height: 10px; background: #a0a8bf; border-radius: 3px; }
  .field-input {
    height: 40px;
    background: #c4c8d4;
    border-radius: 7px;
    border: 2px solid #b0b8cc;
  }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .checkbox { width: 16px; height: 16px; border-radius: 3px; background: #c4c8d4; border: 2px solid #b0b8cc; }
  .check-label { width: 80px; height: 9px; background: #b0b8cc; border-radius: 3px; }
  .forgot { width: 90px; height: 9px; background: #9aa2b8; border-radius: 3px; }

  .submit-btn {
    height: 42px;
    border-radius: 8px;
    background: #8e97b0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .submit-btn .btn-text { width: 64px; height: 12px; background: #d8dce8; border-radius: 3px; }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .div-line { flex: 1; height: 1px; background: #b0b8cc; }
  .div-text { width: 22px; height: 9px; background: #b0b8cc; border-radius: 3px; }

  .social-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .social-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: #c4c8d4; border: 2px solid #b0b8cc;
    cursor: pointer;
  }

  .bottom-text {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .bt-line { height: 9px; background: #b0b8cc; border-radius: 3px; }

  /* signup-only field hidden by default */
  .signup-only { display: none; }
  .auth-card.signup-mode .signup-only { display: flex; }
  .auth-card.signup-mode .login-only { display: none; }

  /* ─── FOOTER ─── */
  .footer {
    height: 44px;
    background: #c4c8d4;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .footer-link { width: 44px; height: 8px; background: #b0b8cc; border-radius: 3px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 960px) {
    .page-body { gap: 32px; }
    .promo-side { max-width: 260px; }
  }
  @media (max-width: 820px) {
    .promo-side { display: none; }
  }
  @media (max-width: 480px) {
    .nav { padding: 0 16px; gap: 8px; }
    .nav-link { display: none; }
    .auth-card { width: 100%; max-width: 380px; padding: 28px 20px 24px; }
    .page-body { padding: 24px 12px; }
    .social-btn { width: 42px; height: 42px; }
    .field-input { height: 38px; }
    .submit-btn { height: 40px; }
    .footer { gap: 10px; flex-wrap: wrap; height: auto; padding: 10px 16px; }
  }
  @media (max-width: 360px) {
    .auth-card { padding: 22px 14px 20px; gap: 16px; }
    .tab { height: 32px; }
    .field-row { flex-direction: column; gap: 8px; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-logo"></div>
  <div class="nav-name"></div>
  <div class="nav-spacer"></div>
  <div class="nav-link"></div>
  <div class="nav-link"></div>
  <div class="nav-link"></div>
  <div class="nav-btn"></div>
</div>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- LEFT: promo blurb -->
  <div class="promo-side">
    <div class="promo-heading">
      <div class="ph" style="width:90%"></div>
      <div class="ph" style="width:75%"></div>
    </div>
    <div class="promo-sub">
      <div class="ps" style="width:100%"></div>
      <div class="ps" style="width:88%"></div>
      <div class="ps" style="width:60%"></div>
    </div>
    <div class="promo-features">
      <div class="feat-row">
        <div class="feat-icon"></div>
        <div class="feat-lines">
          <div class="fl" style="width:80%"></div>
          <div class="fl" style="width:60%"></div>
        </div>
      </div>
      <div class="feat-row">
        <div class="feat-icon"></div>
        <div class="feat-lines">
          <div class="fl" style="width:75%"></div>
          <div class="fl" style="width:55%"></div>
        </div>
      </div>
      <div class="feat-row">
        <div class="feat-icon"></div>
        <div class="feat-lines">
          <div class="fl" style="width:85%"></div>
          <div class="fl" style="width:50%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: auth card -->
  <div class="auth-card" id="authCard">

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab active" id="loginTab" onclick="switchTab('login')">
        <div class="tab-label"></div>
      </div>
      <div class="tab" id="signupTab" onclick="switchTab('signup')">
        <div class="tab-label"></div>
      </div>
    </div>

    <!-- Username (sign-up only) -->
    <div class="field signup-only">
      <div class="field-label" style="width:72px"></div>
      <div class="field-input"></div>
    </div>

    <!-- Email -->
    <div class="field">
      <div class="field-label" style="width:48px"></div>
      <div class="field-input"></div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-label" style="width:64px"></div>
      <div class="field-input"></div>
    </div>

    <!-- Confirm Password (sign-up only) -->
    <div class="field signup-only">
      <div class="field-label" style="width:108px"></div>
      <div class="field-input"></div>
    </div>

    <!-- Remember me / Forgot (login only) -->
    <div class="field-row login-only">
      <div class="check-row">
        <div class="checkbox"></div>
        <div class="check-label"></div>
      </div>
      <div class="forgot"></div>
    </div>

    <!-- Submit -->
    <div class="submit-btn">
      <div class="btn-text"></div>
    </div>

    <!-- Divider -->
    <div class="divider-row">
      <div class="div-line"></div>
      <div class="div-text"></div>
      <div class="div-line"></div>
    </div>

    <!-- Social logins -->
    <div class="social-row">
      <div class="social-btn"></div>
      <div class="social-btn"></div>
      <div class="social-btn"></div>
    </div>

    <!-- Bottom helper text -->
    <div class="bottom-text">
      <div class="bt-line" style="width:90px"></div>
      <div class="bt-line" style="width:50px; background:#9aa2b8"></div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-link"></div>
  <div class="footer-link"></div>
  <div class="footer-link"></div>
  <div class="footer-link" style="width:56px"></div>
</div>

<script>
  function switchTab(mode) {
    const card   = document.getElementById('authCard');
    const login  = document.getElementById('loginTab');
    const signup = document.getElementById('signupTab');
    if (mode === 'signup') {
      card.classList.add('signup-mode');
      signup.classList.add('active');
      login.classList.remove('active');
    } else {
      card.classList.remove('signup-mode');
      login.classList.add('active');
      signup.classList.remove('active');
    }
  }
</script>

</body>
</html>
