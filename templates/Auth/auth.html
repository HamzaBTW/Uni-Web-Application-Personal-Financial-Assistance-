<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="/welcome.html" class="auth-back" aria-label="Go back to welcome page">
                <span class="auth-back-icon">&larr;</span>
            </a>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
            </div>

            <div class="auth-panel active" id="panel-login">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to continue to your dashboard</p>
                <div class="error-msg" id="login-error" style="display:none"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <p class="auth-footer">Don't have an account? <a href="#" data-switch="signup">Sign Up</a></p>
            </div>

            <div class="auth-panel" id="panel-signup">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Start managing your finances today</p>
                <div class="error-msg" id="signup-error" style="display:none"></div>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" name="username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" name="confirm_password" placeholder="Re-enter password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="signup-currency">Preferred Currency (set once)</label>
                        <select id="signup-currency" name="preferred_currency" required>
                            <option value="">Select currency...</option>
                            <option value="USD">USD</option>
                            <option value="GBP">GBP</option>
                            <option value="EUR">EUR</option>
                            <option value="INR">INR</option>
                            <option value="CAD">CAD</option>
                            <option value="AUD">AUD</option>
                            <option value="AED">AED</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                </form>
                <p class="auth-footer">Already have an account? <a href="#" data-switch="login">Login</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js" defer></script>
</body>
</html>
